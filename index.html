<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electronic Manual</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
            background-color: #f4f4f4; /* 加个浅灰背景，看着舒服 */
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: #fff;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
        }
        /* 这里是重点：让图片自适应屏幕 */
        img {
            max-width: 100%;
            height: auto;
            border: 1px solid #ddd; /* 加个细边框，更像文档 */
            display: block; /* 消除图片下面的小空隙 */
            margin: 20px auto; /* 上下留白，左右居中 */
        }
        .note {
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Scan the code for the electronic manual</h1>
        
        <!-- 重点：这里直接放图片 -->
        <!-- 注意：src里的路径必须和你上传的文件名完全一致 -->
        < img src="electronic manual-JPG.png" alt="Lumi Lab Smart Camera Product Manual">
        
        <div class="note">
            If the image is too large, please zoom in or download the PDF version.
        </div>
    </div>
</body>
</html>
