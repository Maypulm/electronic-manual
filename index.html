<!DOCTYPE html>
<html>
<head>
    <title>Electronic Manual</title>
    <!-- 核心：5秒后自动跳转到图片 -->
    <meta http-equiv="refresh" content="5; url='https://github.com/Maypulm/electronic-manual/raw/main/electronic%20manual-JPG.png'">
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background-color: #f8f9fa;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
        }
        p {
            color: #666;
            line-height: 1.6;
        }
        .countdown {
            font-size: 24px;
            color: #007BFF;
            font-weight: bold;
            margin: 20px 0;
        }
        a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #007BFF;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📄 产品说明书</h1>
        <p>正在为您跳转到最新版说明书...</p >
        <div class="countdown" id="countdown">5</div>
        <p>如果页面没有自动跳转，请点击下方按钮：</p >
        <a href=" ">立即查看说明书</a >
        
        <p style="margin-top: 30px; font-size: 12px; color: #999;">
            本页面将在 <span id="seconds">5</span> 秒后自动跳转
        </p >
    </div>

    <script>
        // 倒计时显示
        let seconds = 5;
        const countdownElement = document.getElementById('countdown');
        const secondsElement = document.getElementById('seconds');
        
        const countdown = setInterval(() => {
            seconds--;
            countdownElement.textContent = seconds;
            secondsElement.textContent = seconds;
            
            if (seconds <= 0) {
                clearInterval(countdown);
            }
        }, 1000);
    </script>
</body>
</html>
